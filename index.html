<!DOCTYPE html>
<html>
<head>
  <title>Typing Speed Challenge</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #ff6ec4; }
      to { text-shadow: 0 0 20px #7873f5; }
    }
    #word {
      font-size: 2em;
      font-weight: bold;
      margin: 20px;
      background: rgba(255,255,255,0.1);
      padding: 15px 25px;
      border-radius: 10px;
      display: inline-block;
    }
    input {
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      outline: none;
      margin-top: 10px;
      width: 250px;
      text-align: center;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
    #score {
      margin-top: 30px;
      font-size: 22px;
      font-weight: bold;
    }
    button {
      margin-top: 25px;
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #ff6ec4;
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #7873f5;
    }
    /* Timer bar */
    #timerBar {
      width: 80%;
      height: 15px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    #timerFill {
      height: 100%;
      width: 100%;
      background: #ff6ec4;
      transition: width linear;
    }
  </style>
</head>
<body>
  <h1>🔥 Typing Speed Challenge 🔥</h1>
  <p>Type the word as fast as you can! (5 rounds)</p>
  <div id="word"></div>
  <input type="text" id="inputBox" placeholder="Type here..." />
  <div id="timerBar"><div id="timerFill"></div></div>
  <div id="result"></div>
  <div id="score"></div>
  <button id="restartBtn" style="display:none;">Play Again</button>

  <script>
    const words = ["surprise", "minimal", "exciting", "interactive", "python", "notebook", "friend", "challenge"];
    let round = 1;
    let score = 0;
    let word, startTime, timer;

    function newRound() {
      if (round > 5) {
        document.getElementById("word").textContent = "🎉 Game Over!";
        document.getElementById("score").textContent = `Final Score: ${score}/5`;
        document.getElementById("inputBox").disabled = true;
        document.getElementById("restartBtn").style.display = "inline-block";
        return;
      }
      word = words[Math.floor(Math.random() * words.length)];
      document.getElementById("word").textContent = `Round ${round}: ${word}`;
      document.getElementById("inputBox").value = "";
      document.getElementById("result").textContent = "";
      startTime = Date.now();

      // Reset timer bar
      let timerFill = document.getElementById("timerFill");
      timerFill.style.transition = "none";
      timerFill.style.width = "100%";
      setTimeout(() => {
        timerFill.style.transition = "width 5s linear";
        timerFill.style.width = "0%";
      }, 50);

      // End round if time runs out
      clearTimeout(timer);
      timer = setTimeout(() => {
        document.getElementById("result").textContent = "⏳ Time's up!";
        round++;
        setTimeout(newRound, 1500);
      }, 5000); // 5 seconds per round
    }

    document.getElementById("inputBox").addEventListener("keyup", function(event) {
      if (event.key === "Enter") {
        clearTimeout(timer);
        let typed = this.value;
        let elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
        if (typed === word) {
          score++;
          document.getElementById("result").textContent = `✅ Correct! You took ${elapsed} seconds.`;
        } else {
          document.getElementById("result").textContent = `❌ Wrong! You typed "${typed}" instead of "${word}".`;
        }
        round++;
        setTimeout(newRound, 1500);
      }
    });

    document.getElementById("restartBtn").addEventListener("click", function() {
      round = 1;
      score = 0;
      document.getElementById("inputBox").disabled = false;
      this.style.display = "none";
      newRound();
    });

    newRound();
  </script>
</body>
</html>

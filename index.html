<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-image: url('images/background.jpg');
             background-size: cover;
             background-repeat: no-repeat;
             background-attachment: fixed;">

>
  <div class="container">
    <h1>Typing Speed Challenge</h1>
    <p>Type the words as fast as you can!</p>

    <div id="game-area">
      <div id="prompt">Keep moving forward</div>
      <input type="text" id="input" placeholder="Start typing...">
      <div id="stats">
        <p>Time Left: 18s | Score: 35</p>
      </div>
      <div class="buttons">
        <button id="start-btn">Start Game</button>
        <button id="retry-btn">Try Again</button>
      </div>
    </div>

    <div class="stats">
      <div>Time: 60 Seconds</div>
      <div>Words Per Minute: 52 WPM</div>
      <div>Accuracy: 92%</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
